<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2eff7e",
                        "background-light": "#f5f8f6",
                        "background-dark": "#0a0f0d",
                        "surface-dark": "#111a14",
                        "error": "#FF4D6D",
                        "warning": "#FFB830",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "heading": ["Syne", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "12px",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glow-subtle {
            box-shadow: 0 0 20px rgba(46, 255, 126, 0.05);
        }
        .bg-mesh {
            background: radial-gradient(circle at 50% 0%, rgba(46, 255, 126, 0.05) 0%, rgba(10, 15, 13, 1) 100%);
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen flex items-center justify-center p-4 bg-mesh">
<div class="relative w-full max-w-[480px]">
<!-- Back Button (Floating outside or at top) -->
<div class="absolute -top-16 left-0">
<button class="text-slate-100 flex size-12 items-center justify-center rounded-full bg-surface-dark border border-primary/10 hover:border-primary/30 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<!-- Main Card -->
<div class="bg-surface-dark rounded-2xl border border-primary/5 shadow-2xl p-8 md:p-10 glow-subtle">
<!-- Header Section -->
<div class="mb-10">
<div class="flex items-center gap-2 mb-3">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-mono text-[10px] uppercase tracking-widest text-primary/70">Eco-Inspect AI // Security</span>
</div>
<h1 class="font-heading text-white text-4xl leading-tight">Reset Password</h1>
<p class="font-mono text-sm text-primary/50 mt-2">SECURE_PROTOCOL_INITIATED</p>
</div>
<!-- Form Container -->
<div class="space-y-8">
<!-- New Password Field -->
<div class="flex flex-col gap-2.5">
<label class="font-mono text-xs font-medium uppercase tracking-wider text-primary/60 px-1">
                        New Password
                    </label>
<div class="relative group">
<input class="w-full h-14 bg-background-dark/50 border border-primary/10 rounded-xl px-4 font-mono text-white placeholder:text-primary/10 focus:ring-1 focus:ring-primary/50 focus:border-primary/30 transition-all outline-none" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-primary/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Password Strength Indicator -->
<div class="mt-4 space-y-2.5">
<div class="flex justify-between items-center px-1">
<span class="font-mono text-[10px] text-primary/40 uppercase">Strength: Medium</span>
<span class="font-mono text-[10px] text-warning uppercase">65%</span>
</div>
<div class="flex h-1.5 w-full gap-1.5">
<div class="h-full flex-1 rounded-full bg-error shadow-[0_0_8px_rgba(255,77,109,0.3)]"></div>
<div class="h-full flex-1 rounded-full bg-warning shadow-[0_0_8px_rgba(255,184,48,0.3)]"></div>
<div class="h-full flex-1 rounded-full bg-primary/10"></div>
</div>
<p class="font-mono text-[10px] text-primary/30 leading-relaxed italic">
                            Include special characters and mixed cases for optimal neural encryption.
                        </p>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2.5">
<label class="font-mono text-xs font-medium uppercase tracking-wider text-primary/60 px-1">
                        Confirm Password
                    </label>
<div class="relative">
<input class="w-full h-14 bg-background-dark/50 border border-primary/10 rounded-xl px-4 font-mono text-white placeholder:text-primary/10 focus:ring-1 focus:ring-primary/50 focus:border-primary/30 transition-all outline-none" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-primary/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Footer Action -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-heading font-bold text-lg py-4 rounded-xl shadow-[0_0_30px_rgba(46,255,126,0.15)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>RESET PASSWORD</span>
<span class="material-symbols-outlined text-xl">encrypted</span>
</button>
<div class="mt-8 flex justify-center">
<div class="flex items-center gap-3 opacity-30">
<div class="w-1 h-1 rounded-full bg-primary"></div>
<div class="w-16 h-[1px] bg-primary/30"></div>
<span class="font-mono text-[8px] text-primary tracking-[0.2em] uppercase">Encryption Tier IV</span>
<div class="w-16 h-[1px] bg-primary/30"></div>
<div class="w-1 h-1 rounded-full bg-primary"></div>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
