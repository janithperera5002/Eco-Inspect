<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Case Update | Eco-Inspect AI</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Syne and JetBrains Mono -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Syne:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#111A14',
              surface: '#1A241D',
              green: '#22C55E',
              border: '#2A372E',
              textMuted: '#94A3B8'
            }
          },
          fontFamily: {
            syne: ['Syne', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          borderRadius: {
            'custom': '12px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-typography">
    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: #0A0F0C; /* Slightly darker than form for contrast */
      color: #E2E8F0;
    }
    h1, h2, h3 {
      font-family: 'Syne', sans-serif;
    }
    /* Custom Scrollbar for Textarea */
    textarea::-webkit-scrollbar {
      width: 6px;
    }
    textarea::-webkit-scrollbar-thumb {
      background: #2A372E;
      border-radius: 10px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: AddUpdateModal -->
<main class="w-full max-w-2xl bg-brand-dark rounded-custom border border-brand-border shadow-2xl overflow-hidden" data-purpose="add-update-container">
<!-- Modal Header -->
<header class="p-8 border-b border-brand-border bg-brand-surface/30">
<h1 class="text-3xl font-extrabold text-white tracking-tight">Add Update</h1>
<p class="text-brand-textMuted text-sm mt-1">Eco-Inspect AI Case Management System</p>
</header>
<!-- Form Section -->
<form action="#" class="p-8 space-y-6" method="POST">
<!-- Update Type Selection -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-brand-green" for="update-type">Update Type</label>
<div class="relative">
<select class="w-full bg-brand-surface border-brand-border rounded-custom text-white py-3 px-4 appearance-none focus:ring-2 focus:ring-brand-green focus:border-transparent transition-all" id="update-type" name="update-type">
<option value="field-observation">Field Observation</option>
<option value="analysis-result">AI Analysis Result</option>
<option value="regulatory-compliance">Regulatory Compliance</option>
<option value="client-communication">Client Communication</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-brand-green">
<svg class="h-4 w-4 fill-current" viewbox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"></path></svg>
</div>
</div>
</div>
<!-- Note Text Area -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block text-xs font-bold uppercase tracking-widest text-brand-green" for="update-note">Note</label>
<span class="text-[10px] text-brand-textMuted font-mono" id="char-counter">0 / 1000</span>
</div>
<textarea class="w-full bg-brand-surface border-brand-border rounded-custom text-white p-4 focus:ring-2 focus:ring-brand-green focus:border-transparent transition-all resize-none" id="update-note" maxlength="1000" name="update-note" placeholder="Describe the latest findings or actions taken..." rows="5"></textarea>
</div>
<!-- Status Change Selector -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-brand-green">Update Status To</label>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
<!-- Status Options -->
<label class="cursor-pointer">
<input checked="" class="hidden peer" name="status" type="radio" value="in-progress"/>
<div class="text-center p-3 rounded-custom bg-brand-surface border border-brand-border text-xs font-bold peer-checked:bg-brand-green peer-checked:text-brand-dark transition-colors">
              IN PROGRESS
            </div>
</label>
<label class="cursor-pointer">
<input class="hidden peer" name="status" type="radio" value="pending"/>
<div class="text-center p-3 rounded-custom bg-brand-surface border border-brand-border text-xs font-bold peer-checked:bg-yellow-500 peer-checked:text-black transition-colors">
              PENDING
            </div>
</label>
<label class="cursor-pointer">
<input class="hidden peer" name="status" type="radio" value="review"/>
<div class="text-center p-3 rounded-custom bg-brand-surface border border-brand-border text-xs font-bold peer-checked:bg-blue-500 peer-checked:text-white transition-colors">
              REVIEW
            </div>
</label>
<label class="cursor-pointer">
<input class="hidden peer" name="status" type="radio" value="resolved"/>
<div class="text-center p-3 rounded-custom bg-brand-surface border border-brand-border text-xs font-bold peer-checked:bg-emerald-200 peer-checked:text-black transition-colors">
              RESOLVED
            </div>
</label>
</div>
</div>
<!-- Evidence Upload Area -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-brand-green">Evidence &amp; Attachments</label>
<div class="border-2 border-dashed border-brand-border rounded-custom p-8 hover:border-brand-green transition-colors group cursor-pointer bg-brand-surface/20">
<div class="flex flex-col items-center justify-center space-y-3">
<div class="flex space-x-4">
<!-- Camera Icon -->
<div class="p-3 bg-brand-surface rounded-full text-brand-green group-hover:scale-110 transition-transform">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<!-- File Icon -->
<div class="p-3 bg-brand-surface rounded-full text-brand-green group-hover:scale-110 transition-transform">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
<p class="text-sm text-brand-textMuted font-mono">Drop files or click to capture evidence</p>
<input class="hidden" multiple="" type="file"/>
</div>
</div>
</div>
<!-- Action Buttons -->
<footer class="pt-4 flex flex-col sm:flex-row gap-4">
<button class="flex-1 bg-brand-green text-brand-dark font-syne font-extrabold text-lg py-4 rounded-custom hover:bg-emerald-400 active:scale-[0.98] transition-all uppercase tracking-tight" type="submit">
          Save Update
        </button>
<button class="sm:w-1/3 border border-brand-border text-brand-textMuted font-syne font-bold py-4 rounded-custom hover:bg-brand-surface hover:text-white transition-all uppercase tracking-tight" type="button">
          Cancel
        </button>
</footer>
</form>
</main>
<!-- END: AddUpdateModal -->
<script data-purpose="form-interactivity">
    // Logic for Character Counter
    const textarea = document.getElementById('update-note');
    const counter = document.getElementById('char-counter');

    textarea.addEventListener('input', (e) => {
      const length = e.target.value.length;
      counter.textContent = `${length} / 1000`;
      
      // Visual feedback when reaching limit
      if (length >= 900) {
        counter.classList.add('text-orange-500');
      } else {
        counter.classList.remove('text-orange-500');
      }
    });

    // Mock File Upload Trigger
    const uploadArea = document.querySelector('.border-dashed');
    const fileInput = uploadArea.querySelector('input[type="file"]');
    
    uploadArea.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      if(e.target.files.length > 0) {
        alert(`${e.target.files.length} file(s) selected for upload.`);
      }
    });
  </script>
</body></html>
