<!DOCTYPE html>

<!-- BEGIN: Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'eco-dark': '#1a2e1f',
            'eco-surface': '#243b2a',
            'eco-accent': '#3d5a45',
          },
          animation: {
            'shimmer': 'shimmer 2s infinite linear',
          },
          keyframes: {
            shimmer: {
              '0%': { backgroundPosition: '-1000px 0' },
              '100%': { backgroundPosition: '1000px 0' },
            },
          },
        },
      },
    }
  </script>
<!-- END: Scripts -->
<!-- BEGIN: Styles -->
<style data-purpose="skeleton-animations">
    .skeleton-box {
      background: linear-gradient(90deg, #2a4431 25%, #35533d 50%, #2a4431 75%);
      background-size: 1000px 100%;
      animation: shimmer 2s infinite linear;
      border-radius: 4px;
    }
    .skeleton-circle {
      background: linear-gradient(90deg, #2a4431 25%, #35533d 50%, #2a4431 75%);
      background-size: 1000px 100%;
      animation: shimmer 2s infinite linear;
      border-radius: 50%;
    }
  </style>
<style data-purpose="layout-styles">
    body {
      background-color: #121f15;
      color: #e2e8f0;
      overflow-x: hidden;
