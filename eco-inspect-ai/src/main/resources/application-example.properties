# Database
spring.datasource.url=jdbc:mysql://localhost:3306/eco_inspect_ai
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Airia AI Agent
airia.api.url=YOUR_AIRIA_PIPELINE_URL
airia.api.key=YOUR_AIRIA_API_KEY

# Twilio WhatsApp Sandbox
twilio.account.sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth.token=YOUR_TWILIO_AUTH_TOKEN
twilio.whatsapp.from=whatsapp:+14155238886

# JWT Security
jwt.secret=YOUR_JWT_SECRET_KEY_MIN_32_CHARS

# WhatsApp webhook verify token
whatsapp.verify.token=eco-inspect-verify-2026

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
