<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Eco-Inspect AI - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Syne:wght@700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2DFF7F",
                        "secondary": "#00E5CC",
                        "background-light": "#f5f8f6",
                        "background-dark": "#0A0F0D",
                        "surface-dark": "#111A14",
                        "warning": "#FFB830",
                        "danger": "#FF4D6D",
                        "info": "#4DA6FF",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "syne": ["Syne", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "12px",
                        "lg": "12px",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glow-leaf {
            filter: drop-shadow(0 0 15px rgba(45, 255, 127, 0.4));
        }
        body {
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 flex items-center justify-center p-6">
<!-- Web Login Card -->
<main class="w-full max-w-[900px] grid grid-cols-1 md:grid-cols-2 bg-surface-dark rounded-lg overflow-hidden border border-slate-800/50 shadow-2xl">
<!-- Left Side: Branding/Logo -->
<div class="hidden md:flex flex-col items-center justify-center p-12 bg-gradient-to-br from-background-dark to-surface-dark border-r border-slate-800/50 relative overflow-hidden">
<div class="relative z-10 flex flex-col items-center gap-6">
<div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center glow-leaf border border-primary/20">
<span class="material-symbols-outlined text-primary text-6xl">leaf_spark</span>
</div>
<div class="text-center">
<h2 class="text-primary font-mono text-sm font-bold tracking-[0.3em] uppercase">Eco-Inspect AI</h2>
<p class="text-slate-500 text-xs mt-2 font-mono">ENVIRONMENTAL PROTOCOL V4.2</p>
</div>
</div>
<!-- Background Decorative Glow -->
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Right Side: Login Form -->
<div class="p-8 md:p-12 flex flex-col justify-center">
<!-- Header Section -->
<div class="mb-8">
<div class="md:hidden flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-primary text-3xl glow-leaf">leaf_spark</span>
<span class="text-primary font-mono text-xs font-bold tracking-widest uppercase">Eco-Inspect AI</span>
</div>
<h1 class="text-4xl font-syne font-bold text-white tracking-tight">Welcome Back</h1>
<p class="text-slate-400 mt-2">Sign in to your officer account</p>
</div>
<!-- Form Section -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-mono font-medium text-slate-400 uppercase tracking-wider">Email Address</label>
<div class="relative">
<input class="w-full h-14 bg-background-dark border-2 border-slate-800 rounded-lg px-4 text-white placeholder:text-slate-600 focus:outline-none focus:border-primary transition-colors font-display" placeholder="officer@eco-inspect.ai" type="email" value="janith@ecoinspect.com"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-600">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-xs font-mono font-medium text-slate-400 uppercase tracking-wider">Password</label>
<div class="relative">
<input class="w-full h-14 bg-background-dark border-2 border-slate-800 rounded-lg px-4 text-white placeholder:text-slate-600 focus:outline-none focus:border-primary transition-colors font-display" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-600">visibility_off</span>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-secondary text-sm font-medium hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-black font-syne font-bold text-lg rounded-lg shadow-[0_0_20px_rgba(45,255,127,0.2)] hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Sign In
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Card Footer -->
<div class="mt-10">
<div class="relative h-px bg-slate-800 w-full mb-6">
<span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-surface-dark px-4 text-slate-500 text-[10px] font-mono whitespace-nowrap">ENCRYPTED SESSION</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="p-3 rounded-lg bg-background-dark/50 border border-slate-800/50 flex items-center gap-3">
<span class="material-symbols-outlined text-info text-xl">verified_user</span>
<div class="flex flex-col">
<span class="text-[9px] font-mono text-slate-500 uppercase">Status</span>
<span class="text-[11px] font-bold text-white">SECURE</span>
</div>
</div>
<div class="p-3 rounded-lg bg-background-dark/50 border border-slate-800/50 flex items-center gap-3">
<span class="material-symbols-outlined text-warning text-xl">sensors</span>
<div class="flex flex-col">
<span class="text-[9px] font-mono text-slate-500 uppercase">Region</span>
<span class="text-[11px] font-bold text-white">NORTH-04</span>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Decorative Background Element -->
<div class="fixed bottom-0 left-0 w-full h-64 pointer-events-none opacity-20 bg-gradient-to-t from-primary/10 to-transparent -z-10"></div>

<script src="../../src/shared.js"></script>
<script>
  // Redirect if already logged in
  if (window.auth.isLoggedIn()) {
    window.location.href = 
      '../dashboard/home.html';
  }

  document.querySelector('form')
    .addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.querySelector(
        'input[type="email"]').value.trim();
      const password = document.querySelector(
        'input[type="password"]').value.trim();
      const btn = document.querySelector('button');
      
      if (!email || !password) {
        window.showToast(
          'Please enter email and password', 
          'error');
        return;
      }
      
      const original = btn.textContent;
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      
      try {
        const res = await fetch(
          'http://localhost:8080/api/auth/login',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({email, password})
          }
        );
        
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem(
            'eco_user', JSON.stringify(data));
          window.showToast('Welcome back!', 
            'success');
          setTimeout(() => {
            window.location.href = 
              '../dashboard/home.html';
          }, 800);
        } else {
          window.showToast(
            data.message || 'Login failed', 
            'error');
          btn.textContent = original;
          btn.disabled = false;
        }
      } catch (err) {
        window.showToast(
          'Cannot reach server. Is Spring Boot running?',
          'error');
        btn.textContent = original;
        btn.disabled = false;
      }
  });
</script>

</body></html>
