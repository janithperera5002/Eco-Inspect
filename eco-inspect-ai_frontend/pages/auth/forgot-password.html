<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&amp;family=JetBrains+Mono:wght@400;500&amp;family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2DFF7F",
                        "secondary": "#00E5CC",
                        "background-light": "#f5f8f6",
                        "background-dark": "#0A0F0D",
                        "surface-dark": "#111A14",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "heading": ["Syne", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px",
                    },
                },
            },
        }
    </script>
<style>
        .font-heading { font-family: 'Syne', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        body {
            min-height: 100dvh;
        }
    </style>
  <script src="../../src/shared.js"></script>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased flex items-center justify-center p-6">
<div class="relative w-full max-w-[480px]">
<!-- Centered Card Modal -->
<div class="bg-surface-dark border border-white/5 rounded-3xl p-8 md:p-12 shadow-2xl relative z-10 overflow-hidden">
<!-- Header / Back Button -->
<div class="absolute top-6 left-6 md:top-8 md:left-8">
<button aria-label="Go back" class="text-slate-400 hover:text-white flex size-10 items-center justify-center rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
</div>
<div class="flex flex-col items-center text-center mt-8 md:mt-4">
<!-- Branding/Icon -->
<div class="mb-8">
<div class="size-16 rounded-2xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-background-dark text-3xl font-bold">eco</span>
</div>
</div>
<!-- Typography -->
<h1 class="font-heading text-3xl md:text-4xl font-bold leading-tight mb-4 text-white">
                    Forgot Password
                </h1>
<p class="text-slate-400 text-base font-normal leading-relaxed mb-10 max-w-[320px]">
                    Enter your email and we'll send you a reset link to get back into your account.
                </p>
<!-- Form -->
<form class="space-y-6 w-full text-left">
<div class="flex flex-col gap-2">
<label class="font-mono text-[10px] uppercase font-bold tracking-[0.1em] text-slate-500 ml-1">
                            Email Address
                        </label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-background-dark/50 border-2 border-slate-800 rounded-xl text-white placeholder:text-slate-600 focus:outline-none focus:border-primary/50 focus:ring-0 transition-all font-display" placeholder="name@company.ai" type="email"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">mail</span>
</div>
</div>
</div>
<div class="pt-2">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-background-dark font-heading font-bold text-lg rounded-xl shadow-lg shadow-primary/10 transition-all flex items-center justify-center gap-2 group">
<span>Send Reset Link</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-10">
<a class="inline-flex items-center gap-2 text-secondary hover:brightness-110 font-medium transition-all group" href="login.html">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-0.5 transition-transform">login</span>
<span class="border-b border-transparent hover:border-secondary pb-0.5">Back to Login</span>
</a>
</div>
</div>
<!-- Background subtle glow inside card -->
<div class="absolute -bottom-24 -right-24 size-64 bg-primary/5 blur-3xl rounded-full pointer-events-none"></div>
<div class="absolute -top-24 -left-24 size-48 bg-secondary/5 blur-3xl rounded-full pointer-events-none"></div>
</div>
<!-- Decorative Page Background Elements -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-primary opacity-20"></div>
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 size-[800px] bg-primary/5 blur-[120px] rounded-full pointer-events-none -z-0"></div>
</div>
<script>
document.title = 'Forgot Password — Eco-Inspect AI';

const _form = document.querySelector('form');
const _emailInput = document.querySelector('input[type=email], input[name=email], #email');
const _submitBtn = document.querySelector('button[type=submit], .btn-primary, #submit-btn') ||
  document.querySelector('button:not([aria-label])'); // fallback: first non-back button

let _successBox = document.createElement('div');
_successBox.style.cssText = 'display:none;background:#0A2D14;color:#2DFF7F;' +
  'border:1px solid #2DFF7F33;border-radius:10px;padding:14px;margin-top:14px;' +
  'font-size:14px;text-align:center';
if (_form) _form.after(_successBox);

let _errorBox = document.createElement('div');
_errorBox.style.cssText = 'display:none;color:#FF4D6D;font-size:13px;margin-top:8px;text-align:center';
if (_form) _form.after(_errorBox);

if (_form) {
  _form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = _emailInput?.value.trim();
    if (!email) {
      _errorBox.textContent = 'Please enter your email address';
      _errorBox.style.display = 'block';
      return;
    }
    const origText = _submitBtn?.querySelector('span')?.textContent || 'Send Reset Link';
    if (_submitBtn) { _submitBtn.disabled = true; }
    _errorBox.style.display = 'none';
    try {
      await window.api('POST', '/users/forgot-password', { email });
      _successBox.innerHTML = '✅ If an account exists for <b>' + email +
        '</b>, a reset link has been sent. Please check your email.<br><br>' +
        '<a href="login.html" style="color:#2DFF7F">← Back to Login</a>';
      _successBox.style.display = 'block';
      if (_form) _form.style.display = 'none';
    } catch(err) {
      _errorBox.textContent = err.message || 'Something went wrong. Please try again.';
      _errorBox.style.display = 'block';
      if (_submitBtn) _submitBtn.disabled = false;
    }
  });
}
</script>
</body></html>
