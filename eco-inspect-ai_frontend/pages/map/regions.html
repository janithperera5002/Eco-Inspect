<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Region Boundary Map | Admin Dashboard</title>
<!-- Fonts: Syne for headings, JetBrains Mono for numbers, Inter for body -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;family=Syne:wght@700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            syne: ['Syne', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: {
              green: '#10b981',
              teal: '#14b8a6',
              blue: '#3b82f6',
              purple: '#8b5cf6',
            }
          }
        }
      }
    }
  </script>
<style data-purpose="map-visuals">
    /* Custom map styling to simulate dark-theme immersive map */
    .map-background {
      background-color: #0f172a;
      background-image: 
        radial-gradient(circle at 20% 30%, #1e293b 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, #1e293b 0%, transparent 50%),
        linear-gradient(#1e293b 1px, transparent 1px),
        linear-gradient(90deg, #1e293b 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
    }

    /* Simulate Region Polygons */
    .region-poly {
      cursor: pointer;
      transition: all 0.3s ease;
      clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
    }
    
    .region-poly:hover {
      fill-opacity: 0.4;
      stroke-width: 3px;
    }

    /* Glassmorphism utility */
    .glass-panel {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen overflow-hidden">
<!-- BEGIN: Main Map Container -->
<main class="relative w-full h-full map-background overflow-hidden" data-purpose="map-interface">
<!-- BEGIN: SVG Map Overlay -->
<!-- This SVG acts as the interactive map layer with administrative regions -->
<svg class="absolute inset-0 w-full h-full" preserveaspectratio="xMidYMid slice" viewbox="0 0 1000 1000">
<defs>
<filter id="glow">
<fegaussianblur result="coloredBlur" stddeviation="2.5"></fegaussianblur>
<femerge>
<femergenode in="coloredBlur"></femergenode>
<femergenode in="SourceGraphic"></femergenode>
</femerge>
</filter>
</defs>
<!-- North District -->
<path class="region-poly fill-brand-green/20 stroke-brand-green" d="M100,100 L400,150 L350,400 L50,350 Z" data-purpose="region-north" style="filter: url(#glow);"></path>
<!-- Central Hub -->
<path class="region-poly fill-brand-teal/20 stroke-brand-teal" d="M420,160 L700,200 L650,550 L380,500 Z" data-purpose="region-central" style="filter: url(#glow);"></path>
<!-- East sector -->
<path class="region-poly fill-brand-blue/20 stroke-brand-blue" d="M720,210 L950,250 L900,600 L680,580 Z" data-purpose="region-east" style="filter: url(#glow);"></path>
<!-- South Sector -->
<path class="region-poly fill-brand-purple/20 stroke-brand-purple" d="M300,550 L630,600 L580,900 L250,850 Z" data-purpose="region-south" style="filter: url(#glow);"></path>
<!-- Labels Layer -->
<g class="pointer-events-none select-none">
<text fill="white" font-family="Syne" font-size="14" font-weight="bold" text-anchor="middle" x="200" y="250">NORTH DISTRICT</text>
<text fill="#10b981" font-family="JetBrains Mono" font-size="12" text-anchor="middle" x="200" y="270">124 Reports</text>
<text fill="white" font-family="Syne" font-size="14" font-weight="bold" text-anchor="middle" x="520" y="350">CENTRAL HUB</text>
<text fill="#14b8a6" font-family="JetBrains Mono" font-size="12" text-anchor="middle" x="520" y="370">482 Reports</text>
<text fill="white" font-family="Syne" font-size="14" font-weight="bold" text-anchor="middle" x="820" y="420">EASTERN SECTOR</text>
<text fill="#3b82f6" font-family="JetBrains Mono" font-size="12" text-anchor="middle" x="820" y="440">215 Reports</text>
<text fill="white" font-family="Syne" font-size="14" font-weight="bold" text-anchor="middle" x="440" y="720">SOUTH QUARTER</text>
<text fill="#8b5cf6" font-family="JetBrains Mono" font-size="12" text-anchor="middle" x="440" y="740">309 Reports</text>
</g>
</svg>
<!-- END: SVG Map Overlay -->
<!-- BEGIN: Top Navigation Panel -->
<header class="absolute top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-4xl z-10">
<div class="glass-panel rounded-2xl px-6 py-4 flex items-center justify-between shadow-2xl">
<div class="flex items-center gap-4">
<div class="bg-indigo-600 p-2 rounded-lg">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 20l-5.447-2.724A2 2 0 013 15.488V5.512a2 2 0 011.553-1.944L9 2l6 3 5.447-2.724A2 2 0 0123 4.512v9.976a2 2 0 01-1.553 1.944L15 22l-6-3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<h1 class="font-syne text-xl uppercase tracking-wider">Region Overview</h1>
<p class="text-xs text-slate-400 font-mono">LIVE_STATUS: ACTIVE</p>
</div>
</div>
<div class="flex items-center gap-3">
<select class="bg-slate-800 border-slate-700 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 font-sans">
<option selected="">All Regions</option>
<option>North District</option>
<option>Central Hub</option>
<option>Eastern Sector</option>
<option>South Quarter</option>
</select>
<button class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
            Generate Export
          </button>
</div>
</div>
</header>
<!-- END: Top Navigation Panel -->
<!-- BEGIN: Analytics Sidebar Card -->
<!-- Positioned bottom right as requested -->
<aside class="absolute bottom-8 right-8 w-80 z-10" data-purpose="region-analytics">
<div class="glass-panel rounded-2xl p-6 shadow-2xl border-l-4 border-brand-teal">
<div class="flex justify-between items-start mb-6">
<div>
<span class="text-[10px] font-mono text-brand-teal uppercase tracking-widest">Selected Region</span>
<h2 class="font-syne text-2xl uppercase">Central Hub</h2>
</div>
<div class="bg-teal-500/10 p-2 rounded-full">
<svg class="w-5 h-5 text-brand-teal" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
<div class="space-y-4">
<div class="flex justify-between items-center border-b border-white/5 pb-2">
<span class="text-slate-400 text-sm">Total Reports</span>
<span class="font-mono text-lg font-bold">482</span>
</div>
<div class="flex justify-between items-center border-b border-white/5 pb-2">
<span class="text-slate-400 text-sm">Active Cases</span>
<span class="font-mono text-lg font-bold text-orange-400">34</span>
</div>
<div class="flex justify-between items-center border-b border-white/5 pb-2">
<span class="text-slate-400 text-sm">Assigned Officer</span>
<span class="font-sans text-sm font-semibold">Sgt. K. Aris</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-400 text-sm">Avg. Response</span>
<span class="font-mono text-lg font-bold">14.2m</span>
</div>
</div>
<button class="w-full mt-6 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-syne uppercase tracking-widest transition-all">
          View Detailed Report
        </button>
</div>
</aside>
<!-- END: Analytics Sidebar Card -->
<!-- BEGIN: Map Legend -->
<div class="absolute bottom-8 left-8 z-10" data-purpose="map-legend">
<div class="glass-panel rounded-xl p-4 shadow-xl">
<h3 class="text-[10px] font-syne uppercase tracking-widest text-slate-500 mb-3">Map Legend</h3>
<ul class="space-y-2">
<li class="flex items-center gap-3 text-xs">
<span class="w-3 h-3 rounded-full bg-brand-green shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span>
<span>Commercial Zone</span>
</li>
<li class="flex items-center gap-3 text-xs">
<span class="w-3 h-3 rounded-full bg-brand-teal shadow-[0_0_8px_rgba(20,184,166,0.6)]"></span>
<span>Residential Hub</span>
</li>
<li class="flex items-center gap-3 text-xs">
<span class="w-3 h-3 rounded-full bg-brand-blue shadow-[0_0_8px_rgba(59,130,246,0.6)]"></span>
<span>Industrial Sector</span>
</li>
<li class="flex items-center gap-3 text-xs">
<span class="w-3 h-3 rounded-full bg-brand-purple shadow-[0_0_8px_rgba(139,92,246,0.6)]"></span>
<span>Agricultural Perimeter</span>
</li>
</ul>
</div>
</div>
<!-- END: Map Legend -->
<!-- BEGIN: Map Controls -->
<div class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col gap-2 z-10" data-purpose="zoom-controls">
<button class="glass-panel w-10 h-10 rounded-lg flex items-center justify-center hover:bg-slate-800 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button class="glass-panel w-10 h-10 rounded-lg flex items-center justify-center hover:bg-slate-800 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M20 12H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button class="glass-panel w-10 h-10 rounded-lg flex items-center justify-center hover:bg-slate-800 transition-colors mt-4">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- END: Map Controls -->
</main>
<!-- END: Main Map Container -->
</body></html>
